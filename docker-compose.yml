version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: kilusi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kilusi_bill}
      POSTGRES_USER: ${POSTGRES_USER:-kilusi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kilusi1234}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./docker/postgres/schema:/schema
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - kilusi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kilusi_user} -d ${POSTGRES_DB:-kilusi_bill}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FreeRADIUS Server
  freeradius:
    image: freeradius/freeradius-server:3.2
    container_name: kilusi-freeradius
    restart: unless-stopped
    volumes:
      - ./docker/freeradius/config:/etc/freeradius/3.0/mods-config/sql/main/postgresql
      - ./docker/freeradius/clients.conf:/etc/freeradius/3.0/clients.conf
      - ./docker/freeradius/mods-enabled:/etc/freeradius/3.0/mods-enabled
      - ./docker/freeradius/sites-available:/etc/freeradius/3.0/sites-available
      - ./docker/freeradius/users:/etc/freeradius/3.0/users
    ports:
      - "${RADIUS_AUTH_PORT:-1812}:1812/udp"
      - "${RADIUS_ACCT_PORT:-1813}:1813/udp"
      - "${RADIUS_ADMIN_PORT:-18120}:18120/tcp"
    networks:
      - kilusi-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_NAME=${POSTGRES_DB:-kilusi_bill}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-kilusi_user}
      - DB_PASS=${POSTGRES_PASSWORD:-kilusi1234}
    command: >
      sh -c "
        # Wait for PostgreSQL to be ready
        while ! pg_isready -h postgres -p 5432 -U ${POSTGRES_USER:-kilusi_user}; do
          echo 'Waiting for PostgreSQL...'
          sleep 2
        done
        echo 'PostgreSQL is ready!'

        # Start FreeRADIUS in debug mode initially
        freeradius -X -l stdout
      "
    healthcheck:
      test: ["CMD", "pgrep", "freeradius"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kilusi-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@kilusi.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - kilusi-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - admin

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  kilusi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16