version: '3.8'

services:
  freeradius:
    build: .
    image: kilusi-freeradius:3.2.3
    container_name: kilusi-freeradius
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config:/etc/freeradius/3.0
      - ./mods-config:/etc/freeradius/3.0/mods-config
      - ./scripts:/scripts
      - /var/log/freeradius:/var/log/freeradius
    environment:
      - TZ=Asia/Jakarta
    depends_on:
      - postgres-check
    # Comment out healthcheck for debugging
    # healthcheck:
    #   test: ["CMD", "radtest", "test", "test", "localhost", "0", "testing123"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s

  postgres-check:
    image: postgres:15
    container_name: postgres-check
    restart: "no"
    command: >
      sh -c "
      echo 'Waiting for PostgreSQL to be ready...';
      while ! pg_isready -h 172.22.10.28 -p 5432 -U kilusi_bill; do
        echo 'PostgreSQL not ready, waiting...';
        sleep 2;
      done;
      echo 'PostgreSQL is ready!';
      exit 0;
      "
    networks:
      - freeradius-net

networks:
  freeradius-net:
    driver: bridge