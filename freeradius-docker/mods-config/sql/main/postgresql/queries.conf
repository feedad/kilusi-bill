# PostgreSQL queries.conf for FreeRADIUS 3.x (self-contained)
# Generated to enable nested accounting blocks and proper radacct writes.

sql_user_name = "%{User-Name}"

# Event timestamp helpers (prefer NAS Event-Timestamp, fallback to server time)
event_timestamp_epoch = "%{%{integer:Event-Timestamp}:-%l}"
event_timestamp = "TO_TIMESTAMP(${event_timestamp_epoch})"

# Explicit table mappings (to avoid reliance on mods-available/sql defaults)
authcheck_table  = "radcheck"
authreply_table  = "radreply"
groupcheck_table = "radgroupcheck"
groupreply_table = "radgroupreply"
usergroup_table  = "radusergroup"
postauth_table   = "radpostauth"
acct_table1      = "radacct"
acct_table2      = "radacct"

# Group attribute selector used by authorize_group_* queries
group_attribute  = "SQL-Group"

# Dynamic NAS clients come from ${client_table} which is set in mods-available/sql
client_query = "SELECT id, ip_address AS nasname, short_name AS shortname, COALESCE(type, 'other') AS type, secret, NULL::varchar(64) AS server FROM ${client_table}"

# Authorization queries
authorize_check_query = "SELECT id, username, attribute, value, op FROM ${authcheck_table} WHERE username = '%{SQL-User-Name}' ORDER BY id"
authorize_reply_query = "SELECT id, username, attribute, value, op FROM ${authreply_table} WHERE username = '%{SQL-User-Name}' ORDER BY id"

group_membership_query = "SELECT groupname FROM ${usergroup_table} WHERE username = '%{SQL-User-Name}' ORDER BY priority"
authorize_group_check_query = "SELECT id, groupname, attribute, value, op FROM ${groupcheck_table} WHERE groupname = '%{${group_attribute}}' ORDER BY id"
authorize_group_reply_query = "SELECT id, groupname, attribute, value, op FROM ${groupreply_table} WHERE groupname = '%{${group_attribute}}' ORDER BY id"

# Simultaneous use checks (simple forms)
simul_count_query = "SELECT COUNT(*) FROM ${acct_table1} WHERE username = '%{SQL-User-Name}' AND acctstoptime IS NULL"
simul_verify_query = "SELECT radacctid, acctsessionid, username, nasipaddress, nasportid, framedipaddress FROM ${acct_table1} WHERE username = '%{SQL-User-Name}' AND acctstoptime IS NULL"

#######################################################################
# Accounting and Post-Auth Queries (Nested structure)
#######################################################################
accounting {
  reference = "%{tolower:type.%{%{Acct-Status-Type}:-%{Request-Processing-Stage}}.query}"

  # Logfile disabled due to permission issues
  # logfile = ${logdir}/accounting.sql

  # Match the actual radacct schema used by the app (no acctupdatetime column)
  column_list = "\
    acctsessionid,          acctuniqueid,           username, \
    realm,                  nasipaddress,           nasportid, \
    nasporttype,            acctstarttime,          acctstoptime, \
    acctsessiontime,        acctauthentic,          connectinfo_start, \
    connectinfo_stop,       acctinputoctets,        acctoutputoctets, \
    calledstationid,        callingstationid,       acctterminatecause, \
    servicetype,            framedprotocol,         framedipaddress"

  type {
    accounting-on {
      query = "\
        UPDATE ${....acct_table1} \
        SET \
          acctstoptime = ${....event_timestamp}, \
          acctsessiontime = EXTRACT(EPOCH FROM (${....event_timestamp} - acctstarttime)), \
          acctterminatecause = '%{%{Acct-Terminate-Cause}:-NAS-Reboot}' \
        WHERE acctstoptime IS NULL \
          AND nasipaddress = '%{%{NAS-IPv6-Address}:-%{NAS-IP-Address}}' \
          AND acctstarttime <= ${....event_timestamp}"
    }

    accounting-off {
      query = "${..accounting-on.query}"
    }

    start {
      # Insert a new active session
      query = "\
        INSERT INTO ${....acct_table1} \
          (${...column_list}) \
        VALUES \
          ('%{Acct-Session-Id}', \
           '%{Acct-Unique-Session-Id}', \
           '%{SQL-User-Name}', \
           '%{Realm}', \
           NULLIF('%{%{NAS-IPv6-Address}:-%{NAS-IP-Address}}', '')::inet, \
           NULLIF('%{%{NAS-Port-ID}:-%{NAS-Port}}', ''), \
           '%{NAS-Port-Type}', \
           ${....event_timestamp}, \
           NULL, \
           0, \
           '%{Acct-Authentic}', \
           '%{Connect-Info}', \
           NULL, \
           0, \
           0, \
           '%{Called-Station-Id}', \
           '%{Calling-Station-Id}', \
           '', \
           '%{Service-Type}', \
           '%{Framed-Protocol}', \
           NULLIF('%{Framed-IP-Address}', '')::inet)"

      # If unique constraint prevents insert, update same session row
      query = "\
        UPDATE ${....acct_table1} SET \
          acctstarttime   = ${....event_timestamp}, \
          connectinfo_start = '%{Connect-Info}' \
        WHERE AcctUniqueId = '%{Acct-Unique-Session-Id}'"
    }

    interim-update {
      # Update ongoing session (preferred key: Acct-Unique-Session-Id)
      query = "\
        UPDATE ${....acct_table1} \
        SET \
          acctsessiontime = %{%{Acct-Session-Time}:-NULL}, \
          framedipaddress = NULLIF('%{Framed-IP-Address}', '')::inet, \
          acctinputoctets = ('%{%{Acct-Input-Gigawords}:-0}'::bigint << 32) | '%{%{Acct-Input-Octets}:-0}'::bigint, \
          acctoutputoctets = ('%{%{Acct-Output-Gigawords}:-0}'::bigint << 32) | '%{%{Acct-Output-Octets}:-0}'::bigint \
        WHERE AcctUniqueId = '%{Acct-Unique-Session-Id}'"

      # Fallback: create session if update missed start
      query = "\
        INSERT INTO ${....acct_table1} \
          (${...column_list}) \
        VALUES \
          ('%{Acct-Session-Id}', \
           '%{Acct-Unique-Session-Id}', \
           '%{SQL-User-Name}', \
           '%{Realm}', \
           NULLIF('%{%{NAS-IPv6-Address}:-%{NAS-IP-Address}}', '')::inet, \
           NULLIF('%{%{NAS-Port-ID}:-%{NAS-Port}}', ''), \
           '%{NAS-Port-Type}', \
           TO_TIMESTAMP(${....event_timestamp_epoch} - %{%{Acct-Session-Time}:-0}), \
           ${....event_timestamp}, \
           NULL, \
           %{%{Acct-Session-Time}:-NULL}, \
           '%{Acct-Authentic}', \
           '%{Connect-Info}', \
           NULL, \
           ('%{%{Acct-Input-Gigawords}:-0}'::bigint << 32) | '%{%{Acct-Input-Octets}:-0}'::bigint, \
           ('%{%{Acct-Output-Gigawords}:-0}'::bigint << 32) | '%{%{Acct-Output-Octets}:-0}'::bigint, \
           '%{Called-Station-Id}', \
           '%{Calling-Station-Id}', \
           '', \
           '%{Service-Type}', \
           '%{Framed-Protocol}', \
           NULLIF('%{Framed-IP-Address}', '')::inet)"
    }

    stop {
      # Close session, update stats
      query = "\
        UPDATE ${....acct_table1} \
        SET \
          acctstoptime    = ${....event_timestamp}, \
          acctsessiontime = %{%{Acct-Session-Time}:-NULL}, \
          acctinputoctets = ('%{%{Acct-Input-Gigawords}:-0}'::bigint << 32) | '%{%{Acct-Input-Octets}:-0}'::bigint, \
          acctoutputoctets = ('%{%{Acct-Output-Gigawords}:-0}'::bigint << 32) | '%{%{Acct-Output-Octets}:-0}'::bigint, \
          acctterminatecause = '%{Acct-Terminate-Cause}', \
          connectinfo_stop = '%{Connect-Info}' \
        WHERE AcctUniqueId = '%{Acct-Unique-Session-Id}'"

      # Fallback: synthesize a session if we missed Start
      query = "\
        INSERT INTO ${....acct_table1} \
          (${...column_list}) \
        VALUES \
          ('%{Acct-Session-Id}', \
           '%{Acct-Unique-Session-Id}', \
           '%{SQL-User-Name}', \
           '%{Realm}', \
           NULLIF('%{%{NAS-IPv6-Address}:-%{NAS-IP-Address}}', '')::inet, \
           NULLIF('%{%{NAS-Port-ID}:-%{NAS-Port}}', ''), \
           '%{NAS-Port-Type}', \
           TO_TIMESTAMP(${....event_timestamp_epoch} - %{%{Acct-Session-Time}:-0}), \
           ${....event_timestamp}, \
           ${....event_timestamp}, \
           %{%{Acct-Session-Time}:-NULL}, \
           '%{Acct-Authentic}', \
           '', \
           '%{Connect-Info}', \
           ('%{%{Acct-Input-Gigawords}:-0}'::bigint << 32) | '%{%{Acct-Input-Octets}:-0}'::bigint, \
           ('%{%{Acct-Output-Gigawords}:-0}'::bigint << 32) | '%{%{Acct-Output-Octets}:-0}'::bigint, \
           '%{Called-Station-Id}', \
           '%{Calling-Station-Id}', \
           '%{Acct-Terminate-Cause}', \
           '%{Service-Type}', \
           '%{Framed-Protocol}', \
           NULLIF('%{Framed-IP-Address}', '')::inet)"
    }

    # No Acct-Status-Type
    accounting {
      query = "SELECT true"
    }
  }
}

# Post-Auth logging
post-auth {
  # Logfile disabled due to permission issues
  # logfile = ${logdir}/post-auth.sql

  query = "\
    INSERT INTO ${..postauth_table} (username, pass, reply, authdate) \
    VALUES ('%{SQL-User-Name}', '%{%{User-Password}:-%{Chap-Password}}', '%{reply:Packet-Type}', NOW())"
}
