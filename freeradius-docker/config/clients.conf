# Kilusi-Bill MikroTik Routers
client mikrotik-156 {
    ipaddr = 172.22.10.156
    secret = testing123
    shortname = Mikrotik-156
    nastype = mikrotik
}

# Allow any client for testing (remove in production)
client any {
    ipaddr = 0.0.0.0/0
    secret = testing123
    shortname = any
    nastype = other
}

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    shortname = localhost
    nastype = other
}

# Docker network client (for testing)
client docker-gateway {
    ipaddr = 172.17.0.1
    secret = testing123
    shortname = Docker-Gateway
    nastype = other
}

