# Production Docker Compose for Separate Server Deployment
# Optimized for high-performance production environment

version: '3.8'

services:
  # FreeRADIUS Production Service
  freeradius:
    build:
      context: ./freeradius
      dockerfile: Dockerfile
    container_name: kilusi-freeradius-prod
    restart: always
    ports:
      - "1812:1812/udp"   # Authentication
      - "1813:1813/udp"   # Accounting
      - "3799:3799/udp"   # CoA (Change of Authorization)
      - "18120:18120"     # Health check API
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - RADIUS_SECRET=${RADIUS_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - MAX_CLIENTS=${MAX_CLIENTS:-10000}
      - THREAD_POOL_START=${THREAD_POOL_START:-32}
      - THREAD_POOL_MAX=${THREAD_POOL_MAX:-128}
      - DB_POOL_MIN=${DB_POOL_MIN:-20}
      - DB_POOL_MAX=${DB_POOL_MAX:-200}
      - ENABLE_MONITORING=${ENABLE_MONITORING:-true}
      - LOG_ROTATION=${LOG_ROTATION:-daily}
    volumes:
      - ./freeradius/config:/etc/freeradius/3.0:ro
      - ./freeradius/logs:/var/log/freeradius
      - ./scripts:/opt/freeradius/scripts
      - freeradius-prod-data:/var/lib/freeradius
      - /etc/localtime:/etc/localtime:ro
    networks:
      - radius-prod
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18120/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx Load Balancer (Optional for HA)
  nginx-lb:
    image: nginx:alpine
    container_name: kilusi-nginx-lb
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - radius-prod
    depends_on:
      - freeradius
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # Redis Cluster for Caching
  redis-master:
    image: redis:7-alpine
    container_name: kilusi-redis-master
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - radius-prod
    command: >
      redis-server
      --port 6379
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis-slave:
    image: redis:7-alpine
    container_name: kilusi-redis-slave
    restart: unless-stopped
    volumes:
      - redis-slave-data:/data
    networks:
      - radius-prod
    command: >
      redis-server
      --port 6379
      --slaveof redis-master 6379
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    depends_on:
      - redis-master
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: kilusi-prometheus-prod
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-prod-data:/prometheus
      - /etc/localtime:/etc/localtime:ro
    networks:
      - radius-prod
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: kilusi-grafana-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}
      - GF_SMTP_USER=${SMTP_USER}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${SMTP_FROM}
    volumes:
      - grafana-prod-data:/var/lib/grafana
      - ./monitoring/grafana-prod:/etc/grafana/provisioning
      - /etc/localtime:/etc/localtime:ro
    networks:
      - radius-prod
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # Log Management (ELK Stack)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: kilusi-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - radius-prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: kilusi-logstash
    restart: unless-stopped
    volumes:
      - ./monitoring/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./freeradius/logs:/var/log/freeradius:ro
    networks:
      - radius-prod
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kilusi-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - radius-prod
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

volumes:
  freeradius-prod-data:
    driver: local
  redis-master-data:
    driver: local
  redis-slave-data:
    driver: local
  prometheus-prod-data:
    driver: local
  grafana-prod-data:
    driver: local
  elasticsearch-data:
    driver: local

networks:
  radius-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16