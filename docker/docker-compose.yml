# FreeRADIUS Docker Compose for Development & Production
# Supports 2000+ customers with high availability

version: '3.8'

services:
  # FreeRADIUS Service
  freeradius:
    build:
      context: ./freeradius
      dockerfile: Dockerfile
    container_name: kilusi-freeradius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"   # Authentication
      - "1813:1813/udp"   # Accounting
      - "3799:3799/udp"   # CoA (Change of Authorization)
      - "18120:18120"     # Health check
    environment:
      - DB_HOST=${DB_HOST:-172.22.10.28}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-kilusi_bill}
      - DB_USER=${DB_USER:-kilusi_user}
      - DB_PASSWORD=${DB_PASSWORD:-kilusi123}
      - RADIUS_SECRET=${RADIUS_SECRET:-testing123}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_CLIENTS=${MAX_CLIENTS:-5000}
      - THREAD_POOL_START=${THREAD_POOL_START:-16}
      - THREAD_POOL_MAX=${THREAD_POOL_MAX:-64}
    volumes:
      - ./freeradius/config:/etc/freeradius/3.0:ro
      - ./freeradius/logs:/var/log/freeradius
      - ./scripts:/opt/freeradius/scripts
      - freeradius-data:/var/lib/freeradius
    networks:
      - radius-network
    depends_on:
      - healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18120/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Health Check Service
  healthcheck:
    image: alpine:latest
    container_name: kilusi-healthcheck
    command: >
      sh -c "
      apk add --no-cache curl &&
      echo 'Health check service started' &&
      while true; do
        sleep 30;
      done"
    networks:
      - radius-network

  # Redis for Caching (Optional, for high-performance)
  redis:
    image: redis:7-alpine
    container_name: kilusi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - radius-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Monitoring Stack (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: kilusi-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - radius-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: kilusi-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - radius-network
    depends_on:
      - prometheus

volumes:
  freeradius-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  radius-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16