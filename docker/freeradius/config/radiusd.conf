# FreeRADIUS 3.2 Main Configuration
# Optimized for high performance with 2000+ concurrent users

# Global settings
prefix = /usr
exec_prefix = /usr/sbin
sysconfdir = /etc
localstatedir = /var
run_dir = ${localstatedir}/run/${name}
log_dir = ${localstatedir}/log/${name}
libdir = /usr/lib/freeradius
radacctdir = ${logdir}/radacct
confdir = ${sysconfdir}/${name}
modconfdir = ${confdir}/mods-config
certdir = ${confdir}/certs
cadir = ${confdir}/ca
rcdir = ${confdir}/rc.d
run_dir = ${run_dir}

# Core configuration
name = freeradius
instance_name = freeradius

# Logging configuration
log {
    destination = files
    file = ${log_dir}/radius.log
    syslog_facility = daemon
    stripped_names = no

    # Log levels (set to 'warn' in production)
    auth = no
    auth_badpass = yes
    auth_goodpass = no
    msg_badpass = no
    msg_goodpass = no

    # Request logging
    debug = ${LOG_LEVEL:-debug}
}

# Security settings
security {
    max_attributes = 200
    reject_delay = 1
    status_server = yes
    allow_vulnerable_openssl = no
    max_requests = 4096
    regularize_chap_password = yes
}

# Thread pool configuration for high concurrency
thread pool {
    start_servers = ${THREAD_POOL_START:-32}
    max_servers = ${THREAD_POOL_MAX:-128}
    min_spare_servers = 16
    max_spare_servers = 64
    max_requests_per_server = 0
    auto_limit_acct = no
    idle_timeout = 60
}

# Proxy configuration
proxy {
    synchronous = no
    retry_delay = 5
    retry_count = 3
    dead_time = 120
    default_fallback = NO
}

# Client configuration
client {
    # Read clients from database
    read_clients = yes
    client_table = "nas_servers"
    $INCLUDE ${confdir}/clients.conf
}

# Module configuration
modules {
    # SQL module for database authentication
    $INCLUDE ${modconfdir}/sql
    sql = sql
    sql {
        $INCLUDE ${modconfdir}/sql/main/${dialect}/queries.conf
    }

    # Dynamic clients from database
    dynamic_clients {
        client_attribute = "NAS-IP-Address"
    }

    # Counter module for tracking
    counter {
        daily = "Daily-Access: %{sql:SELECT COUNT(*) FROM radacct WHERE Acct-Date = '%{%{expr:%Y%m%d}}';"
        monthly = "Monthly-Access: %{sql:SELECT COUNT(*) FROM radacct WHERE Acct-Date >= '%{%{expr:%Y%m}01}' AND Acct-Date <= '%{%{expr:%Y%m%d}}';}"
    }

    # Detail module for accounting
    detail {
        daily = "${confdir}/sql/modules/sql/daily"
        exec = "${confdir}/sql/modules/sql/exec"
    }

    # Exec module for external scripts
    exec {
        wait = yes
        program = "/usr/lib/freeradius/radiusd"
        shell_escape = yes
        escape = none
    }

    # Expiration module
    expiration {
        user_message = "Password has expired"
    }

    # Logintime module for session management
    logintime {
        query = "UPDATE radcheck SET value = '%{sql:SELECT STRFTIME('%Y-%m-%d', CURRENT_TIMESTAMP + INTERVAL %{check-expires} DAY)}' WHERE username = '%{User-Name}' AND attribute = 'Expiration'"
    }
}

# Instantiate modules
instantiate {
    exec
    expr
    expiration
    logintime
    detail
    daily
    sql
}

# Policy configuration
policy {
    # Filter out invalid usernames
    filter_username {
        if (User-Name =~ /[\\r\\n]/) {
            reject "Username contains invalid characters"
        }

        if (User-Name =~ /[\\t\\s]+/) {
            reject "Username contains spaces"
        }
    }

    # Handle EAP-TTLS/PEAP inner tunnel
    eap {
        ok
    }

    # Check for active user
    active_users {
        if ("%{sql:SELECT COUNT(*) FROM radacct WHERE username='%{User-Name}' AND acctstoptime IS NULL}" > "1") {
            # User already has active session
            if ("%{sql:SELECT COUNT(*) FROM radpostauth WHERE username='%{User-Name}' AND authdate > NOW() - INTERVAL '1 minute' AND reply = 'Access-Reject'}" > "3") {
                # Too many failed attempts - reject
                    reject "Too many authentication attempts"
            } else {
                # Allow but with caution
                    update request {
                        Session-Timeout = 300
                    }
            }
        }
    }
}

# Include virtual server configurations
$INCLUDE ${confdir}/sites-enabled/

# Health check endpoint
listen {
    type = status
    ipaddr = 127.0.0.1
    port = 18120
    limit {
        max_connections = 10
        lifetime = 0
        idle_timeout = 10
    }
}

# Status server for health checks
status {
    listen = 127.0.0.1
    port = 18120
    allow = 127.0.0.1
}