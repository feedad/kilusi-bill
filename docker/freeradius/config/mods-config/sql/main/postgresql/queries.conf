# PostgreSQL queries optimized for 2000+ concurrent users
# High-performance SQL queries for kilusi-bill RADIUS implementation

# Authorization Queries with Optimized Indexes
authorize_check_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authcheck_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id \
    LIMIT 100"

authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authreply_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id \
    LIMIT 100"

authorize_group_check_query = "\
    SELECT id, groupname, attribute, value, op \
    FROM ${groupcheck_table} \
    WHERE groupname = '%{${group_attribute}}' \
    ORDER BY id \
    LIMIT 50"

authorize_group_reply_query = "\
    SELECT id, groupname, attribute, value, op \
    FROM ${groupreply_table} \
    WHERE groupname = '%{${group_attribute}}' \
    ORDER BY id \
    LIMIT 50"

# User group query optimized for performance
group_membership_query = "\
    SELECT groupname \
    FROM ${usergroup_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY priority ASC, groupname ASC \
    LIMIT 10"

# Accounting Queries - Optimized for High Volume
accounting_onoff_query = ""

accounting_update_query = "\
    UPDATE ${acct_table1} \
    SET \
        acctsessiontime = EXTRACT(EPOCH FROM (NOW() - acctstarttime))::BIGINT, \
        acctinputoctets = (('%{%{Acct-Input-Gigawords}:-0}' BIGINT << 32) + '%{%{Acct-Input-Octets}:-0}'::BIGINT), \
        acctoutputoctets = (('%{%{Acct-Output-Gigawords}:-0}' BIGINT << 32) + '%{%{Acct-Output-Octets}:-0}'::BIGINT) \
    WHERE acctsessionid = '%{Acct-Session-Id}' \
    AND username = '%{SQL-User-Name}' \
    AND nasipaddress = '%{NAS-IP-Address}' \
    AND acctstoptime IS NULL"

accounting_update_query_alt = "\
    INSERT INTO ${acct_table1} ( \
        acctsessionid, acctuniqueid, username, nasipaddress, nasportid, \
        acctstarttime, acctupdatetime, acctsessiontime, acctinputoctets, acctoutputoctets, \
        framedipaddress, callingstationid, calledstationid \
    ) VALUES ( \
        '%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
        '%{NAS-IP-Address}', '%{%{NAS-Port-ID}:-%{NAS-Port}}', \
        NOW() - INTERVAL '%{%{Acct-Session-Time}:-0} second'::INTERVAL, NOW(), \
        '%{%{Acct-Session-Time}:-0}', \
        (('%{%{Acct-Input-Gigawords}:-0}' BIGINT << 32) + '%{%{Acct-Input-Octets}:-0}'::BIGINT), \
        (('%{%{Acct-Output-Gigawords}:-0}' BIGINT << 32) + '%{%{Acct-Output-Octets}:-0}'::BIGINT), \
        '%{Framed-IP-Address}', '%{Calling-Station-Id}', '%{Called-Station-Id}' \
    ) ON CONFLICT (acctuniqueid) DO UPDATE SET \
        acctupdatetime = NOW(), \
        acctsessiontime = EXCLUDED.acctsessiontime, \
        acctinputoctets = EXCLUDED.acctinputoctets, \
        acctoutputoctets = EXCLUDED.acctoutputoctets"

accounting_start_query = "\
    INSERT INTO ${acct_table1} ( \
        acctsessionid, acctuniqueid, username, nasipaddress, nasportid, \
        framedipaddress, callingstationid, calledstationid, \
        acctstarttime, nasporttype, servicetype, framedprotocol, \
        connectinfo_start, framedprotocol \
    ) VALUES ( \
        '%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
        '%{NAS-IP-Address}', '%{%{NAS-Port-ID}:-%{NAS-Port}}', \
        '%{Framed-IP-Address}', '%{Calling-Station-Id}', '%{Called-Station-Id}', \
        NOW(), '%{NAS-Port-Type}', '%{Service-Type}', '%{Framed-Protocol}', \
        '%{Connect-Info}', '%{Framed-Protocol}' \
    ) ON CONFLICT (acctuniqueid) DO UPDATE SET \
        acctstarttime = NOW(), \
        acctupdatetime = NOW(), \
        acctstoptime = NULL, \
        connectinfo_start = '%{Connect-Info}'"

accounting_start_query_alt = "\
    UPDATE ${acct_table1} \
    SET \
        acctstarttime = NOW(), \
        acctupdatetime = NOW(), \
        acctstoptime = NULL, \
        connectinfo_start = '%{Connect-Info}' \
    WHERE acctsessionid = '%{Acct-Session-Id}' \
    AND username = '%{SQL-User-Name}' \
    AND nasipaddress = '%{NAS-IP-Address}'"

accounting_stop_query = "\
    UPDATE ${acct_table1} \
    SET \
        acctstoptime = NOW(), \
        acctsessiontime = COALESCE('%{%{Acct-Session-Time}:-0}', EXTRACT(EPOCH FROM (NOW() - acctstarttime))::BIGINT), \
        acctinputoctets = COALESCE((('%{%{Acct-Input-Gigawords}:-0}' BIGINT << 32) + '%{%{Acct-Input-Octets}:-0}'::BIGINT), acctinputoctets), \
        acctoutputoctets = COALESCE((('%{%{Acct-Output-Gigawords}:-0}' BIGINT << 32) + '%{%{Acct-Output-Octets}:-0}'::BIGINT), acctoutputoctets), \
        acctterminatecause = COALESCE('%{Acct-Terminate-Cause}', 'User-Request'), \
        connectinfo_stop = '%{Connect-Info}' \
    WHERE acctsessionid = '%{Acct-Session-Id}' \
    AND username = '%{SQL-User-Name}' \
    AND nasipaddress = '%{NAS-IP-Address}' \
    AND acctstoptime IS NULL"

accounting_stop_query_alt = "\
    INSERT INTO ${acct_table1} ( \
        acctsessionid, acctuniqueid, username, nasipaddress, nasportid, \
        framedipaddress, acctstarttime, acctstoptime, acctsessiontime, \
        acctinputoctets, acctoutputoctets, acctterminatecause, \
        connectinfo_start, connectinfo_stop \
    ) VALUES ( \
        '%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
        '%{NAS-IP-Address}', '%{%{NAS-Port-ID}:-%{NAS-Port}}', \
        '%{Framed-IP-Address}', \
        NOW() - INTERVAL '%{%{Acct-Session-Time}:-0} second'::INTERVAL, \
        NOW(), '%{%{Acct-Session-Time}:-0}', \
        (('%{%{Acct-Input-Gigawords}:-0}' BIGINT << 32) + '%{%{Acct-Input-Octets}:-0}'::BIGINT), \
        (('%{%{Acct-Output-Gigawords}:-0}' BIGINT << 32) + '%{%{Acct-Output-Octets}:-0}'::BIGINT), \
        '%{Acct-Terminate-Cause}', \
        '%{Connect-Info}', '%{Connect-Info}' \
    )"

