# NAS Client Query - Read from nas_servers table
client_query = "\
    SELECT ip_address as nasname, shortname, secret, type, \
           server as nas_type, description, ports \
    FROM ${client_table} \
    WHERE is_active = true"

# Session cleanup query for ghost sessions
session_cleanup_query = "\
    UPDATE ${acct_table1} \
    SET acctstoptime = NOW(), \
        acctterminatecause = 'Admin-Cleanup' \
    WHERE acctstoptime IS NULL \
    AND ( \
        framedipaddress::text = '0.0.0.0' \
        OR framedipaddress IS NULL \
        OR acctstarttime < NOW() - INTERVAL '1 hour' \
    )"

# Active sessions query for monitoring
active_sessions_query = "\
    SELECT COUNT(*) as active_count \
    FROM ${acct_table1} \
    WHERE acctstoptime IS NULL \
    AND acctstarttime > NOW() - INTERVAL '24 hours'"

# Performance monitoring query
performance_stats_query = "\
    SELECT \
        DATE_TRUNC('hour', acctstarttime) as hour_bucket, \
        COUNT(*) as session_count, \
        AVG(acctsessiontime) as avg_duration, \
        SUM(acctinputoctets) as total_input, \
        SUM(acctoutputoctets) as total_output \
    FROM ${acct_table1} \
    WHERE acctstarttime >= NOW() - INTERVAL '24 hours' \
    GROUP BY DATE_TRUNC('hour', acctstarttime) \
    ORDER BY hour_bucket DESC"